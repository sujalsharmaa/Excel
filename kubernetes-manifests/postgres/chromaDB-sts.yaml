apiVersion: v1
kind: Namespace
metadata:
  name: chromadb

---
apiVersion: v1
kind: Service
metadata:
  name: chromadb-headless
  namespace: default
  labels: # <--- FIXED: Now nested under metadata
    app: chromadb
spec:
  clusterIP: None
  selector:
    app: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chromadb
  namespace: default
spec:
  serviceName: chromadb-headless
  replicas: 1

  selector:
    matchLabels:
      app: chromadb

  template:
    metadata:
      labels:
        app: chromadb

    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        fsGroup: 1000

      containers:
        - name: chromadb

          image: chromadb/chroma:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000
              name: http

          env:
            - name: IS_PERSISTENT
              value: "TRUE"

            - name: PERSIST_DIRECTORY
              value: "/chroma/chroma"

            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"

            - name: ALLOW_RESET
              value: "TRUE"

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "1"
              memory: "2Gi"

          volumeMounts:
            - name: chromadb-data
              mountPath: /chroma/chroma

          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5

  volumeClaimTemplates:
    - metadata:
        name: chromadb-data

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: gp2
        resources:
          requests:
            storage: 20Gi